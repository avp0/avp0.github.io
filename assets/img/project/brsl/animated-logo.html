<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --berkeley-blue: #003262;
      --logo-cyan: #00e5e5;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
    }

    .logo-card {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 14px 12px;
      overflow: hidden;
      background: transparent;
      isolation: isolate;
    }

    .logo-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 20%, rgba(255, 255, 255, 0.34) 42%, transparent 64%);
      transform: translateX(-115%);
      animation: lightSweep 4.6s ease-in-out 1.3s infinite;
      pointer-events: none;
      z-index: 3;
    }

    .seal-window {
      position: relative;
      z-index: 2;
      width: clamp(68px, 26%, 96px);
      aspect-ratio: 1;
      flex: 0 0 auto;
      overflow: hidden;
      border-radius: 50%;
      background: var(--logo-cyan);
      box-shadow: 0 10px 28px rgba(0, 50, 98, 0.2);
      animation: sealSettle 1s cubic-bezier(0.2, 0.9, 0.2, 1) both;
    }

    .seal-window img {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 560%;
      max-width: none;
      transform: translate(-8.9%, -50%);
    }

    .text-lockup {
      position: relative;
      z-index: 2;
      min-width: 0;
      margin-left: clamp(8px, 3.4%, 15px);
      color: var(--berkeley-blue);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .line {
      display: block;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(12px);
      animation: lineIn 0.75s ease forwards;
    }

    .line-small {
      font-size: clamp(16px, 5.8vw, 24px);
      line-height: 0.94;
      animation-delay: 0.42s;
    }

    .line-large {
      font-size: clamp(21px, 7.1vw, 31px);
      line-height: 0.95;
      animation-delay: 0.62s;
    }

    @keyframes sealSettle {
      0% {
        opacity: 0;
        transform: translateX(-18px) scale(0.88);
      }

      100% {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes lineIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes lightSweep {
      0%, 48% {
        transform: translateX(-115%);
      }

      72%, 100% {
        transform: translateX(115%);
      }
    }
  </style>
</head>
<body>
  <div class="logo-card" aria-label="UC Berkeley Risk and Security Lab">
    <div class="seal-window" aria-hidden="true">
      <img src="full-color-scaled.png" alt="">
    </div>
    <div class="text-lockup">
      <span class="line line-small">UC Berkeley</span>
      <span class="line line-large">Risk &amp; Security Lab</span>
    </div>
  </div>
</body>
</html>
